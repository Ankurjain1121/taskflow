networks:
  taskbolt-network:
    driver: bridge
    ipam:
      config:
        - subnet: 10.0.2.0/24
          gateway: 10.0.2.1

volumes:
  minio-data:

services:
  minio:
    image: minio/minio:latest
    container_name: taskbolt-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:?MINIO_ACCESS_KEY must be set in .env}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:?MINIO_SECRET_KEY must be set in .env}
      MINIO_API_CORS_ALLOW_ORIGIN: "${APP_URL:-http://localhost:4200}"
    volumes:
      - minio-data:/data
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    networks:
      - taskbolt-network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio-setup:
    image: minio/mc:latest
    container_name: taskbolt-minio-setup
    entrypoint: /bin/sh -c "until mc alias set myminio http://minio:9000 $${MINIO_ACCESS_KEY} $${MINIO_SECRET_KEY}; do sleep 2; done; mc mb myminio/$${MINIO_BUCKET} --ignore-existing; mc anonymous set none myminio/$${MINIO_BUCKET};"
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:?MINIO_ACCESS_KEY must be set in .env}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:?MINIO_SECRET_KEY must be set in .env}
      MINIO_BUCKET: ${MINIO_BUCKET:-task-attachments}
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - taskbolt-network
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M

  backend:
    image: taskbolt-backend
    container_name: taskbolt-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://taskbolt_app:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}@10.0.2.1:5432/${POSTGRES_DB:-taskbolt}
      APP_DATABASE_URL: postgresql://taskbolt_app:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}@10.0.2.1:5432/${POSTGRES_DB:-taskbolt}
      DB_MAX_CONNECTIONS: ${DB_MAX_CONNECTIONS:-80}
      DB_MIN_CONNECTIONS: ${DB_MIN_CONNECTIONS:-20}
      HOST: 0.0.0.0
      PORT: 8080
      RUST_LOG: ${RUST_LOG:-info,sqlx=warn}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in .env}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET must be set in .env}
      JWT_ACCESS_EXPIRY_SECS: ${JWT_ACCESS_EXPIRY_SECS:-900}
      JWT_REFRESH_EXPIRY_SECS: ${JWT_REFRESH_EXPIRY_SECS:-604800}
      REDIS_URL: redis://10.0.2.1:6379/0
      MINIO_ENDPOINT: http://minio:9000
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL:-http://localhost:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:?MINIO_ACCESS_KEY must be set in .env}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:?MINIO_SECRET_KEY must be set in .env}
      MINIO_BUCKET: ${MINIO_BUCKET:-task-attachments}
      NOVU_API_URL: ""
      NOVU_API_KEY: ""
      LAGO_API_URL: ""
      LAGO_API_KEY: ""
      WAHA_API_URL: "http://10.10.10.1:3001"
      WAHA_API_KEY: "waha-internal-key-2024-secure"
      WAHA_SESSION_NAME: "tenant-ed0e2bd5-0ee1-4eca-838e-c854d38e4426-1"
      WAHA_ENABLED: "true"
      CRON_SECRET: ${CRON_SECRET:-}
      APP_URL: ${APP_URL:-http://localhost:4200}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM_ADDRESS: ${RESEND_FROM_ADDRESS:-noreply@taskbolt.local}
      RESEND_FROM_NAME: ${RESEND_FROM_NAME:-TaskBolt}
    depends_on:
      minio:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    networks:
      - taskbolt-network
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  frontend:
    image: taskbolt-frontend
    container_name: taskbolt-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-80}:8080"
    networks:
      - taskbolt-network
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
        reservations:
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
