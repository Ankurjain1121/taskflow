# =============================================================================
# TaskFlow - Docker Compose Configuration
# =============================================================================
# Full stack: Rust backend, Angular frontend, PostgreSQL, Redis, MongoDB,
#             MinIO, Lago, Novu, Postal, WAHA
#
# WebSocket: Native Axum + Redis pub/sub (no external service needed)
#
# Redis DB isolation:
#   - db0: Application (sessions, cache, pub/sub)
#   - db1: Lago (billing)
#   - db2: Novu (notifications)
#
# Usage:
#   docker compose up -d              # Start all services
#   docker compose up -d --build      # Rebuild and start
#   docker compose logs -f backend    # View backend logs
#   docker compose down -v            # Stop and remove volumes
# =============================================================================

networks:
  taskflow-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  mongodb-data:
  minio-data:
  lago-storage:
  postal-config:

services:
  # ===========================================================================
  # 1. PostgreSQL - Primary Database
  # ===========================================================================
  postgres:
    image: postgres:16-alpine
    container_name: taskflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-taskflow}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - taskflow-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-taskflow}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ===========================================================================
  # 2. Redis - Caching, Sessions, Pub/Sub
  # ===========================================================================
  # Database isolation:
  #   db0 = Application (default)
  #   db1 = Lago billing
  #   db2 = Novu notifications
  redis:
    image: redis:7-alpine
    container_name: taskflow-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - taskflow-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ===========================================================================
  # 3. MongoDB - For Novu Notifications
  # ===========================================================================
  mongodb:
    image: mongo:7
    container_name: taskflow-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-admin}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-novu}
    volumes:
      - mongodb-data:/data/db
    ports:
      - "${MONGO_PORT:-27017}:27017"
    networks:
      - taskflow-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ===========================================================================
  # 4. MinIO - S3-Compatible Object Storage
  # ===========================================================================
  minio:
    image: minio/minio:latest
    container_name: taskflow-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_API_CORS_ALLOW_ORIGIN: "${APP_URL:-http://localhost:4200}"
    volumes:
      - minio-data:/data
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    networks:
      - taskflow-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ===========================================================================
  # 5. Lago API - Billing & Metering (Optional)
  # ===========================================================================
  lago-api:
    image: getlago/api:v1.18.1
    container_name: taskflow-lago-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${LAGO_DB:-lago}
      REDIS_URL: redis://redis:6379/1
      SECRET_KEY_BASE: ${LAGO_SECRET_KEY:?LAGO_SECRET_KEY must be set in .env}
      RAILS_ENV: production
      RAILS_LOG_TO_STDOUT: "true"
      LAGO_API_URL: http://lago-api:3000
      LAGO_FRONT_URL: http://localhost:8085
      RSA_PRIVATE_KEY: ${LAGO_RSA_PRIVATE_KEY:-}
      LAGO_DISABLE_SIGNUP: ${LAGO_DISABLE_SIGNUP:-false}
      LAGO_FROM_EMAIL: ${LAGO_FROM_EMAIL:-noreply@taskflow.local}
      LAGO_SMTP_ADDRESS: postal
      LAGO_SMTP_PORT: 25
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${LAGO_API_PORT:-3000}:3000"
    networks:
      - taskflow-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    profiles:
      - billing

  # ===========================================================================
  # 6. Lago Front - Billing UI
  # ===========================================================================
  lago-front:
    image: getlago/front:v1.18.1
    container_name: taskflow-lago-front
    restart: unless-stopped
    environment:
      API_URL: http://lago-api:3000
      APP_ENV: production
      LAGO_DISABLE_SIGNUP: ${LAGO_DISABLE_SIGNUP:-false}
    depends_on:
      lago-api:
        condition: service_healthy
    ports:
      - "${LAGO_FRONT_PORT:-8085}:80"
    networks:
      - taskflow-network
    profiles:
      - billing

  # ===========================================================================
  # 7. Novu - Notifications Infrastructure
  # ===========================================================================
  novu:
    image: ghcr.io/novuhq/novu/api:0.24.0
    container_name: taskflow-novu
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      MONGO_URL: mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASSWORD:-admin}@mongodb:27017/${MONGO_DB:-novu}?authSource=admin
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB_INDEX: 2
      API_ROOT_URL: http://localhost:3001
      DISABLE_USER_REGISTRATION: "false"
      JWT_SECRET: ${NOVU_JWT_SECRET:?NOVU_JWT_SECRET must be set in .env}
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${NOVU_API_PORT:-3001}:3000"
    networks:
      - taskflow-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/v1/health-check"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    profiles:
      - notifications

  # ===========================================================================
  # 8. Postal Init - One-shot initialization for Postal
  # ===========================================================================
  postal-init:
    image: ghcr.io/postalserver/postal:3.3.4
    container_name: taskflow-postal-init
    command: ["postal", "initialize"]
    environment:
      POSTAL_WEB_HOSTNAME: ${POSTAL_HOSTNAME:-postal.localhost}
      POSTAL_SMTP_HOSTNAME: ${POSTAL_SMTP_HOSTNAME:-smtp.localhost}
      POSTAL_WEB_PROTOCOL: http
      POSTAL_MAIN_DB_HOST: postgres
      POSTAL_MAIN_DB_USERNAME: ${POSTGRES_USER:-postgres}
      POSTAL_MAIN_DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTAL_MAIN_DB_DATABASE: postal
      POSTAL_MESSAGE_DB_HOST: postgres
      POSTAL_MESSAGE_DB_USERNAME: ${POSTGRES_USER:-postgres}
      POSTAL_MESSAGE_DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postal-config:/config
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - taskflow-network
    profiles:
      - email

  # ===========================================================================
  # 9. Postal - Email Server
  # ===========================================================================
  postal:
    image: ghcr.io/postalserver/postal:3.3.4
    container_name: taskflow-postal
    restart: unless-stopped
    command: ["postal", "web-server"]
    environment:
      POSTAL_WEB_HOSTNAME: ${POSTAL_HOSTNAME:-postal.localhost}
      POSTAL_SMTP_HOSTNAME: ${POSTAL_SMTP_HOSTNAME:-smtp.localhost}
      POSTAL_WEB_PROTOCOL: http
      POSTAL_MAIN_DB_HOST: postgres
      POSTAL_MAIN_DB_USERNAME: ${POSTGRES_USER:-postgres}
      POSTAL_MAIN_DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTAL_MAIN_DB_DATABASE: postal
      POSTAL_MESSAGE_DB_HOST: postgres
      POSTAL_MESSAGE_DB_USERNAME: ${POSTGRES_USER:-postgres}
      POSTAL_MESSAGE_DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postal-config:/config
    depends_on:
      postal-init:
        condition: service_completed_successfully
    ports:
      - "${POSTAL_WEB_PORT:-8086}:5000"
      - "${POSTAL_SMTP_PORT:-25}:25"
    networks:
      - taskflow-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    profiles:
      - email

  # ===========================================================================
  # 10. WAHA - WhatsApp HTTP API
  # ===========================================================================
  waha:
    image: devlikeapro/waha:latest
    container_name: taskflow-waha
    restart: unless-stopped
    environment:
      WHATSAPP_HOOK_URL: http://backend:8080/api/webhooks/whatsapp
      WHATSAPP_HOOK_EVENTS: message,session.status
      WAHA_DASHBOARD_ENABLED: "true"
      WAHA_DASHBOARD_USERNAME: ${WAHA_DASHBOARD_USER:?WAHA_DASHBOARD_USER must be set in .env}
      WAHA_DASHBOARD_PASSWORD: ${WAHA_DASHBOARD_PASSWORD:?WAHA_DASHBOARD_PASSWORD must be set in .env}
      WAHA_LOG_LEVEL: info
    ports:
      - "${WAHA_PORT:-3002}:3000"
    networks:
      - taskflow-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    profiles:
      - whatsapp

  # ===========================================================================
  # 11. Migrate - Run SQLx Migrations (One-shot)
  # ===========================================================================
  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: builder
    container_name: taskflow-migrate
    command: ["sqlx", "migrate", "run", "--source", "/app/crates/db/src/migrations"]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-taskflow}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - taskflow-network

  # ===========================================================================
  # 12. Backend - Rust API Server
  # ===========================================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: taskflow-backend
    restart: unless-stopped
    environment:
      # Database
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-taskflow}
      APP_DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-taskflow}
      # Server
      HOST: 0.0.0.0
      PORT: 8080
      RUST_LOG: ${RUST_LOG:-info,sqlx=warn,tower_http=debug}
      # Auth
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in .env}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET must be set in .env}
      JWT_ACCESS_EXPIRY_SECS: ${JWT_ACCESS_EXPIRY_SECS:-900}
      JWT_REFRESH_EXPIRY_SECS: ${JWT_REFRESH_EXPIRY_SECS:-604800}
      # Redis
      REDIS_URL: redis://redis:6379/0
      # MinIO
      MINIO_ENDPOINT: http://minio:9000
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL:-http://localhost:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-task-attachments}
      # Postal (SMTP)
      POSTAL_SMTP_HOST: postal
      POSTAL_SMTP_PORT: 25
      # Lago (Billing)
      LAGO_API_URL: http://lago-api:3000
      LAGO_API_KEY: ${LAGO_API_KEY:-}
      # Novu (Notifications)
      NOVU_API_URL: http://novu:3000
      NOVU_API_KEY: ${NOVU_API_KEY:-}
      # WAHA (WhatsApp)
      WAHA_API_URL: http://waha:3000
      WAHA_API_KEY: ${WAHA_API_KEY:-}
      # Cron
      CRON_SECRET: ${CRON_SECRET:-}
      # App
      APP_URL: ${APP_URL:-http://localhost:4200}
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    networks:
      - taskflow-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ===========================================================================
  # 13. Frontend - Angular + nginx
  # ===========================================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: taskflow-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-80}:80"
    networks:
      - taskflow-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

  # ===========================================================================
  # MinIO Setup - Create bucket and configure CORS (One-shot)
  # ===========================================================================
  minio-setup:
    image: minio/mc:latest
    container_name: taskflow-minio-setup
    entrypoint: >
      /bin/sh -c "
      until mc alias set myminio http://minio:9000 $${MINIO_ACCESS_KEY} $${MINIO_SECRET_KEY}; do
        echo 'Waiting for MinIO...';
        sleep 2;
      done;
      mc mb myminio/$${MINIO_BUCKET} --ignore-existing;
      mc anonymous set none myminio/$${MINIO_BUCKET};
      echo 'MinIO setup complete (bucket is private, use presigned URLs for access)!';
      "
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-task-attachments}
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - taskflow-network
