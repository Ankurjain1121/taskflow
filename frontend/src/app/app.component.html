<!-- Top Navigation Bar (authenticated routes only) -->
@if (showSidebar()) {
  <app-top-nav
    (menuToggle)="openMobileSidebar()"
    (searchOpen)="openSearch()"
    (quickCreate)="onQuickCreate()"
  />
}

<!-- Main Layout -->
<div
  class="flex h-screen overflow-hidden"
  [class.pt-12]="showSidebar()"
  style="background: var(--background)"
>
  @if (showSidebar()) {
    <!-- Mobile backdrop overlay -->
    @if (mobileOpen()) {
      <div
        class="fixed inset-0 bg-black/50 z-30 md:hidden"
        [style.top]="'var(--nav-height)'"
        (click)="closeMobileSidebar()"
      ></div>
    }

    <!-- Sidebar wrapper -->
    <div
      class="flex-shrink-0 z-40 transition-all duration-300 ease-in-out"
      [class]="getSidebarClasses()"
    >
      <app-sidebar
        [collapsed]="sidebarCollapsed()"
        [isMobileOpen]="mobileOpen()"
        (toggleCollapse)="onToggleSidebar()"
        (sidebarClose)="closeMobileSidebar()"
        (searchOpen)="openSearch()"
      />
    </div>
  }

  <!-- Page Content -->
  <div class="flex-1 overflow-auto min-w-0">
    <div
      class="route-transition-wrapper"
      [@routeAnimations]="getRouteAnimationData(outlet)"
    >
      <router-outlet #outlet="outlet" />
    </div>
  </div>
</div>

<!-- Command Palette (deferred until idle, pre-loaded on interaction) -->
@defer (on idle) {
  <app-command-palette [isOpen]="searchOpen()" (closed)="closeSearch()" />
}

<!-- Toast Notifications -->
<app-toast-container />

<!-- Floating Timer Widget -->
@if (showSidebar()) {
  <app-timer-widget />
}

<!-- PrimeNG Toast (for error interceptor) -->
<p-toast />

<!-- Undo Toast (for undo service) -->
<p-toast key="undo" position="bottom-center" />

<!-- Service Worker Update Toast -->
<p-toast key="sw-update" position="bottom-right" (onClose)="onSwUpdateAction()" />

<!-- Keyboard Shortcuts Help (global) -->
@defer (on idle) {
  <app-shortcut-help />
}

<!-- View Switcher (deferred until idle) -->
@defer (on idle) {
  <app-view-switcher
    [isOpen]="viewSwitcherOpen()"
    (closed)="closeViewSwitcher()"
    (viewSelected)="onViewSelected($event)"
  />
}

<!-- Quick Create Task Dialog (global, deferred to idle) -->
@defer (on idle) {
  <app-quick-create-task-dialog [(visible)]="quickCreateOpen" />
}

<!-- Workspace Settings Dialog (global, deferred to idle) -->
@defer (on idle) {
  <app-workspace-settings-dialog />
}
