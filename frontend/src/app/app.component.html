<!-- Main Layout: single router-outlet, sidebar conditionally rendered -->
<div class="flex h-screen overflow-hidden">
  @if (showSidebar()) {
    <app-sidebar (searchOpen)="openSearch()" class="shrink-0" />
  }
  <div class="flex-1 overflow-auto">
    <div class="route-transition-wrapper" [@routeAnimations]="getRouteAnimationData(outlet)">
      <router-outlet #outlet="outlet" />
    </div>
  </div>
</div>

<!-- Global Search Overlay -->
<app-global-search
  [isOpen]="searchOpen()"
  (closed)="closeSearch()"
/>

<!-- Toast Notifications -->
<app-toast-container />

<!-- PrimeNG Toast (for error interceptor) -->
<p-toast />

<!-- Workspace Settings Dialog (global) -->
<app-workspace-settings-dialog />
