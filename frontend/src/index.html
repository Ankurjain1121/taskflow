<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Frontend</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>
  <script>
    // Prevent flash of wrong theme — runs synchronously before paint
    (function() {
      var theme = localStorage.getItem('taskflow-theme') || 'system';
      var palette = localStorage.getItem('taskflow-palette') || 'default';
      var accent = localStorage.getItem('taskflow-accent');
      var dark = theme === 'dark' || (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
      if (dark) {
        document.documentElement.classList.add('dark');
        if (palette === 'dracula') document.documentElement.classList.add('dracula');
        if (palette === 'dimmed') document.documentElement.classList.add('dimmed');
      }
      if (accent && accent !== 'indigo') document.documentElement.setAttribute('data-accent', accent);
    })();
  </script>
  <app-root></app-root>
</body>
</html>
