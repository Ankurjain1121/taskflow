<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>TaskBolt</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@500;600;700&family=Inter:wght@400;500;600;700&family=Nunito:wght@400;600;700&family=Nunito+Sans:wght@400;600&family=Space+Grotesk:wght@400;500;600;700&family=Work+Sans:wght@400;500;600&family=Poppins:wght@400;500;600;700&family=Lora:wght@400;500;600;700&family=Source+Sans+3:wght@400;600&family=Outfit:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
    <script>
      // Apply theme before first paint to prevent FOUC
      (function () {
        var mode = localStorage.getItem('taskbolt-theme') || 'system';
        var isDark =
          mode === 'dark' ||
          (mode === 'system' &&
            window.matchMedia('(prefers-color-scheme: dark)').matches);
        if (isDark) document.documentElement.classList.add('dark');
        document.documentElement.setAttribute('data-sidebar-style', 'light');

        // Light theme
        var lightTheme = localStorage.getItem('taskbolt-light-theme') || 'warm-earth';
        if (lightTheme !== 'warm-earth')
          document.documentElement.setAttribute('data-theme', lightTheme);

        // Dark theme (only set attribute when dark mode active)
        var darkTheme = localStorage.getItem('taskbolt-dark-theme') || 'warm-earth-dark';
        if (isDark && darkTheme !== 'warm-earth-dark')
          document.documentElement.setAttribute('data-dark-theme', darkTheme);
      })();
    </script>
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>
