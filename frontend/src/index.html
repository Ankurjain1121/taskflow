    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="TaskBolt" />
    <meta property="og:title" content="TaskBolt" />
    <meta property="og:description" content="Fast, friendly project management for modern teams." />
    <meta property="og:url" content="https://taskflow.paraslace.in/" />

    <meta name="twitter:card" content="summary_large_image" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@500;600;700&family=Inter:wght@400;500;600;700&family=Nunito:wght@400;600;700&family=Nunito+Sans:wght@400;600&family=Space+Grotesk:wght@400;500;600;700&family=Work+Sans:wght@400;500;600&family=Poppins:wght@400;500;600;700&family=Lora:wght@400;500;600;700&family=Source+Sans+3:wght@400;600&family=Outfit:wght@400;500;600;700&family=Manrope:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
    <script>
      // Apply theme before first paint to prevent FOUC
      (function () {
        var mode = localStorage.getItem('taskbolt-theme') || 'system';
        var isDark =
          mode === 'dark' ||
          (mode === 'system' &&
            window.matchMedia('(prefers-color-scheme: dark)').matches);
        if (isDark) document.documentElement.classList.add('dark');
        document.documentElement.setAttribute('data-sidebar-style', 'light');

        // Light theme — always set attribute
        var lightTheme = localStorage.getItem('taskbolt-light-theme') || 'terracotta-studio';
        document.documentElement.setAttribute('data-theme', lightTheme);

        // Dark theme — always set attribute when dark mode active
        var darkTheme = localStorage.getItem('taskbolt-dark-theme') || 'terracotta-studio-dark';
        if (isDark)
          document.documentElement.setAttribute('data-dark-theme', darkTheme);
      })();
    </script>
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>
