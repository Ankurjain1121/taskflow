# =============================================================================
# TaskBolt - VPS Production Deployment (Nginx reverse proxy on host)
# =============================================================================
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.vps.yml up -d
#
# This overlay:
#   - Removes port exposures (Nginx on host handles all traffic)
#   - Sets production-ready configurations
# =============================================================================

services:
  # ===========================================================================
  # Override Services - Remove Direct Port Exposures
  # ===========================================================================

  # Frontend: Remove port 80 exposure (Nginx handles it)
  frontend:
    ports: !override []

  # Backend: Remove port 8080 exposure (Nginx handles it)
  backend:
    ports: !override []
    environment:
      # Database
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-taskbolt}
      APP_DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-taskbolt}
      # Server
      HOST: 0.0.0.0
      PORT: 8080
      RUST_LOG: ${RUST_LOG:-info,sqlx=warn}
      # Auth
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      # Redis
      REDIS_URL: redis://redis:6379/0
      # MinIO - Internal
      MINIO_ENDPOINT: http://minio:9000
      MINIO_PUBLIC_URL: https://files.paraslace.in
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET:-task-attachments}
      # App
      APP_URL: https://taskflow.paraslace.in

  # MinIO: Remove direct port exposures (Nginx handles it)
  minio:
    ports: !override []
