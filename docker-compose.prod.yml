# =============================================================================
# TaskBolt - Docker Compose Production Configuration
# =============================================================================
# Production-ready configuration with all optimizations
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Or create a symlink:
#   ln -sf docker-compose.prod.yml docker-compose.override.yml
# =============================================================================

services:
  # ===========================================================================
  # Backend - Production optimizations
  # ===========================================================================
  backend:
    # No volume mounts in production
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      RUST_LOG: info,sqlx=warn,tower_http=info

  # ===========================================================================
  # Frontend - Production optimizations
  # ===========================================================================
  frontend:
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ===========================================================================
  # MinIO - Production optimizations
  # ===========================================================================
  minio:
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
