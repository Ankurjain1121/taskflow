## Context
You are working on a full-stack project management application.

## Project Structure
- Backend: Rust with PostgreSQL
- Frontend: Angular with TypeScript
- Real-time: WebSocket via Redis pub/sub
- Auth: JWT-based authentication

## Key Components
### Backend (Rust)
- automation.rs, project.rs - Data models
- automations.rs, recurring.rs, notifications.rs - Database queries
- workspace.rs, milestone.rs - API routes
- errors.rs - Error handling
- broadcast.rs - Real-time updates via Redis

### Frontend (Angular)
- api.service.ts - Base HTTP client
- automation.service.ts, workspace.service.ts - Domain services
- websocket.service.ts - Real-time updates
- keyboard-shortcuts.service.ts - UX features

## Data Flow
1. Frontend calls API service
2. API routes validate & authorize
3. Database queries execute
4. Broadcast service publishes updates
5. WebSocket pushes to clients

