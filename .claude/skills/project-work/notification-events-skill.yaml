## Notification Event Types (from events.rs)

### NotificationEvent Enum
- TaskAssigned - When a task is assigned to a user
- TaskDueSoon - When a task is approaching its due date
- TaskOverdue - When a task passes its due date
- TaskCommented - When a comment is added to a task
- TaskCompleted - When a task is marked complete
- MentionInComment - When a user is mentioned in a comment

### Event Methods
- name() -> &'static str - Returns event name (e.g., "task-assigned")
- title() -> &'static str - Human-readable title
- from_str() -> Option<NotificationEvent> - Parse from string

## Notification Queries (from notifications.rs)

### NotificationListResponse
- items: Vec<Notification>
- next_cursor: Option<String> - For pagination
- unread_count: i64

### Functions
- list_notifications(pool, user_id, cursor, limit) -> NotificationListResponse
- get_unread_count(pool, user_id) -> i64
- mark_read(pool, notification_id, user_id)
